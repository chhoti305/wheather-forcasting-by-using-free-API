<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skyglass — Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky-deep: #0a0f1e;
      --sky-mid: #0e1a35;
      --sky-accent: #1a2d5a;
      --glow-blue: #4f8ef7;
      --glow-cyan: #38d9f5;
      --glow-warm: #f7c948;
      --text-primary: #e8edf8;
      --text-secondary: #7a8aaa;
      --text-dim: #3d4d6a;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --radius: 18px;
    }

    body {
      background: var(--sky-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8edf8 30%, var(--glow-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Search */
    .search-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .search-input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--glow-blue);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--glow-blue), var(--glow-cyan));
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }

    .search-btn:hover { opacity: 0.88; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error */
    .error-msg {
      background: rgba(247,80,80,0.1);
      border: 1px solid rgba(247,80,80,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f75050;
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: none;
    }

    /* Loading */
    .loader {
      text-align: center;
      padding: 60px 0;
      display: none;
    }

    .loader-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow-blue);
      margin: 0 4px;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(--glow-cyan); }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; background: var(--glow-warm); }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-12px); opacity: 1; }
    }

    /* Weather output */
    #weather-output { display: none; animation: fadeUp 0.5s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero card */
    .hero-card {
      background: linear-gradient(145deg, rgba(79,142,247,0.12), rgba(56,217,245,0.06));
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: var(--radius);
      padding: 36px 32px 30px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,217,245,0.07), transparent 70%);
      pointer-events: none;
    }

    .location-name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .location-region {
      font-size: 0.82rem;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .temp-row {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 12px;
    }

    .temp-main {
      font-family: 'JetBrains Mono', monospace;
      font-size: 5rem;
      font-weight: 500;
      line-height: 1;
      background: linear-gradient(135deg, #e8edf8, var(--glow-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-feel {
      padding-bottom: 10px;
    }

    .temp-feel span {
      display: block;
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
    }

    .temp-feel strong {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      color: var(--text-primary);
    }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .condition-icon { width: 42px; height: 42px; }

    .condition-text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: rgba(79,142,247,0.3); }

    .stat-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-unit {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* AQI card */
    .aqi-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .aqi-left .stat-label { margin-bottom: 6px; }

    .aqi-badge {
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Astronomy row */
    .astro-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .astro-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .astro-icon { font-size: 1.8rem; }

    .astro-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .astro-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Local time */
    .local-time {
      text-align: center;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .temp-main { font-size: 3.8rem; }
      .location-name { font-size: 1.6rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Skyglass</div>
      <div class="tagline">Real-time weather intelligence</div>
    </header>

    <div class="search-wrap">
      <input class="search-input" id="locationInput" type="text" placeholder="Enter city, region, or coordinates…" autocomplete="off"/>
      <button class="search-btn" id="searchBtn" onclick="fetchWeather()">Search</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="loader" id="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>

    <div id="weather-output">
      <!-- Hero -->
      <div class="hero-card">
        <div class="location-name" id="locName"></div>
        <div class="location-region" id="locRegion"></div>
        <div class="temp-row">
          <div class="temp-main" id="tempC"></div>
          <div class="temp-feel">
            <span>Feels like</span>
            <strong id="feelsLike"></strong>
          </div>
        </div>
        <div class="condition-row">
          <img class="condition-icon" id="condIcon" src="" alt=""/>
          <span class="condition-text" id="condText"></span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity"></div>
          <div class="stat-unit">percent</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Wind Speed</div>
          <div class="stat-value" id="wind"></div>
          <div class="stat-unit">km/h · <span id="windDir"></span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Visibility</div>
          <div class="stat-value" id="visibility"></div>
          <div class="stat-unit">kilometres</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pressure</div>
          <div class="stat-value" id="pressure"></div>
          <div class="stat-unit">millibars</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">UV Index</div>
          <div class="stat-value" id="uv"></div>
          <div class="stat-unit" id="uvLabel"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cloud Cover</div>
          <div class="stat-value" id="cloud"></div>
          <div class="stat-unit">percent</div>
        </div>
      </div>

      <!-- AQI -->
      <div class="aqi-card" id="aqiCard">
        <div class="aqi-left">
          <div class="stat-label">Air Quality Index</div>
          <div class="stat-value" id="aqiValue"></div>
        </div>
        <div class="aqi-badge" id="aqiBadge"></div>
      </div>

      <!-- Sunrise / Sunset placeholder (from local time) -->
      <div class="astro-row">
        <div class="astro-card">
          <div class="astro-icon">🌅</div>
          <div>
            <div class="astro-label">Local Time</div>
            <div class="astro-value" id="localTime"></div>
          </div>
        </div>
        <div class="astro-card">
          <div class="astro-icon">📍</div>
          <div>
            <div class="astro-label">Coordinates</div>
            <div class="astro-value" id="coords"></div>
          </div>
        </div>
      </div>

      <div class="local-time" id="lastUpdated"></div>
    </div>
  </div>

  <script>
    const API_KEY = '34bacc6320e6489ab52132515262406';

    const input = document.getElementById('locationInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchWeather();
    });

    function show(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function uvLabel(uv) {
      if (uv <= 2) return 'Low';
      if (uv <= 5) return 'Moderate';
      if (uv <= 7) return 'High';
      if (uv <= 10) return 'Very High';
      return 'Extreme';
    }

    function aqiInfo(idx) {
      const levels = [
        { label: 'Good',            color: '#22c55e', bg: 'rgba(34,197,94,0.15)' },
        { label: 'Moderate',        color: '#f7c948', bg: 'rgba(247,201,72,0.15)' },
        { label: 'Unhealthy (Sensitive)', color: '#f97316', bg: 'rgba(249,115,22,0.15)' },
        { label: 'Unhealthy',       color: '#ef4444', bg: 'rgba(239,68,68,0.15)' },
        { label: 'Very Unhealthy',  color: '#a855f7', bg: 'rgba(168,85,247,0.15)' },
        { label: 'Hazardous',       color: '#be123c', bg: 'rgba(190,18,60,0.15)' },
      ];
      return levels[Math.min(idx - 1, 5)] || levels[0];
    }

    async function fetchWeather() {
      const location = input.value.trim();
      if (!location) {
        showError('Please enter a location to search.');
        return;
      }

      hideError();
      setLoading(true);

      try {
        const url = `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${encodeURIComponent(location)}&aqi=yes`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          showError(data.error.message || 'Location not found. Please try again.');
          setLoading(false);
          return;
        }

        renderWeather(data);
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
      }

      setLoading(false);
    }

    function renderWeather(data) {
      const { location, current } = data;

      // Location
      show('locName', location.name);
      show('locRegion', [location.region, location.country].filter(Boolean).join(', '));

      // Temperature
      show('tempC', Math.round(current.temp_c) + '°');
      show('feelsLike', Math.round(current.feelslike_c) + '°C');

      // Condition
      document.getElementById('condIcon').src = 'https:' + current.condition.icon;
      document.getElementById('condIcon').alt = current.condition.text;
      show('condText', current.condition.text);

      // Stats
      show('humidity', current.humidity + '%');
      show('wind', current.wind_kph);
      show('windDir', current.wind_dir);
      show('visibility', current.vis_km);
      show('pressure', current.pressure_mb);
      show('uv', current.uv);
      show('uvLabel', uvLabel(current.uv));
      show('cloud', current.cloud + '%');

      // AQI
      if (current.air_quality && current.air_quality['us-epa-index']) {
        const idx = current.air_quality['us-epa-index'];
        const info = aqiInfo(idx);
        show('aqiValue', idx);
        const badge = document.getElementById('aqiBadge');
        badge.textContent = info.label;
        badge.style.color = info.color;
        badge.style.background = info.bg;
        badge.style.border = `1px solid ${info.color}55`;
        document.getElementById('aqiCard').style.display = 'flex';
      } else {
        document.getElementById('aqiCard').style.display = 'none';
      }

      // Time & coords
      show('localTime', location.localtime.split(' ')[1] || location.localtime);
      show('coords', `${location.lat}°, ${location.lon}°`);
      show('lastUpdated', 'Last updated · ' + current.last_updated);

      document.getElementById('weather-output').style.display = 'block';
    }

    function setLoading(state) {
      document.getElementById('loader').style.display = state ? 'block' : 'none';
      document.getElementById('weather-output').style.display = state ? 'none' : (document.getElementById('locName').textContent ? 'block' : 'none');
      document.getElementById('searchBtn').disabled = state;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>
</body>
</html>
